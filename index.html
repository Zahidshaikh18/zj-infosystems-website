<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZJ Infosystems</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<style>
  /* Global Reset & Base */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #f4f6f9;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.25) !important;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      z-index: 999;
      transition: all 0.4s ease;
    }

    .navbar.scrolled {
      background: rgba(0, 0, 0, 0.8) !important;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .navbar-brand img {
      height: 40px;
      margin-right: 10px;
    }

    .navbar a {
      position: relative;
      color: white !important;
      font-weight: 500;
      text-decoration: none;
      padding: 10px 15px;
      transition: all 0.3s ease;
    }

    .navbar a::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 50%;
      width: 0%;
      height: 2px;
      background: #ffd85c;
      transition: all 0.4s ease;
      transform: translateX(-50%);
    }

    .navbar a:hover::after {
      width: 80%;
    }

    .navbar a:hover {
      color: #0E2148 !important;
      color: white !important;
      text-shadow: 0 0 10px rgba(255, 216, 92, 0.5);
      transform: scale(1.05);
    }

  /* ====================
     HERO SECTION
  ==================== */
  .hero {
    background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.75)),
                url('./static/nasa-Q1p7bh3SHj8-unsplash.jpg') center/cover fixed no-repeat;
    color: white;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 20px;
    animation: backgroundPan 40s infinite alternate ease-in-out;
  }

  .hero div {
    animation: fadeIn 1.5s ease forwards;
  }

  .hero h1 {
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 20px;
    animation: slideInDown 1.2s ease-in-out;
  }

  .hero p {
    font-size: 1.25rem;
    max-width: 800px;
    margin: 0 auto;
    animation: slideInUp 1.4s ease-in-out;
  }

  .hero h1:hover,
  .hero p:hover {
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    transition: all 0.4s ease;
  }

  /* ====================
     BUTTON (if used)
  ==================== */
  .btn-primary {
    background-color: #007bff;
    border: none;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
  }

  .btn-primary:hover {
    box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
    transform: translateY(-2px);
  }

  /* ====================
     ANIMATIONS
  ==================== */
  @keyframes fadeIn {
    0% {
      opacity: 0;
      transform: translateY(20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slideInDown {
    from {
      opacity: 0;
      transform: translateY(-40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slideInUp {
    from {
      opacity: 0;
      transform: translateY(40px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes backgroundPan {
    0% {
      background-position: center;
    }
    100% {
      background-position: top;
    }
  }

  /* ====================
     RESPONSIVE
  ==================== */
  @media (max-width: 768px) {
    .hero h1 {
      font-size: 2.25rem;
    }

    .hero p {
      font-size: 1rem;
    }

    .navbar a {
      padding: 8px 10px;
    }
  }
</style>


</head>



<body>

  <!-- Navbar -->
  {% include 'navbar.html' %}

  <!-- Hero Section -->
  <section class="hero">
    <div>
      <h1>Transforming Technology, Empowering Businesses</h1>
      <p>End-to-end IT and ITeS solutions designed to drive efficiency, security, and innovation across your enterprise.</p>
      <!-- Optional button -->
      <!-- <a href="#contact" class="btn btn-primary mt-3">Get Started</a> -->
    </div>
  </section>

  <!-- Bootstrap JS -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  window.addEventListener("scroll", function () {
    const navbar = document.querySelector(".navbar");
    if (window.scrollY > 10) {
      navbar.classList.add("scrolled");
    } else {
      navbar.classList.remove("scrolled");
    }
  });
</script>


</body>
</html>
