<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    .nav-link svg {
      margin-right: 8px;
    }

    .chart-container {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      height: 400px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .chart-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }

    .admin-icon {
      margin-right: 8px;
    }

    @media (max-width: 768px) {
      .chart-container {
        height: 300px;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="d-flex">
    <!-- Sidebar -->
    {% include "sidebar.html" %}

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">
      <h2 class="text-center mb-4">Dashboard Overview</h2>

      <!-- Charts Row -->
      <div class="row g-4">
        <!-- Weekly Attendance Chart -->
        <div class="col-lg-6">
          <div class="card chart-container">
            <h5 class="text-center mb-3">Weekly Attendance Summary</h5>
            <canvas id="myChart"></canvas>
          </div>
        </div>

        <!-- Monthly Clients Chart -->
        <div class="col-lg-6">
          <div class="card chart-container">
            <h5 class="text-center mb-3">Monthly Clients Overview</h5>
            <canvas id="clientChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Attendance Chart Script -->
  <script>
    const labels = {{ labels|tojson }};
    const presentData = {{ present_counts|tojson }};
    const absentData = {{ absent_counts|tojson }};
    const leaveData = {{ leave_counts|tojson }};
    const lateData = {{ late_counts|tojson }};

    const data = {
      labels: labels,
      datasets: [
        { label: 'Present', data: presentData, backgroundColor: 'rgba(75, 192, 192, 0.7)' },
        { label: 'Absent', data: absentData, backgroundColor: 'rgba(255, 99, 132, 0.7)' },
        { label: 'On Leave', data: leaveData, backgroundColor: 'rgba(255, 206, 86, 0.7)' },
        { label: 'Late', data: lateData, backgroundColor: 'rgba(153, 102, 255, 0.7)' }
      ]
    };

    new Chart(document.getElementById('myChart'), {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          title: { display: true, text: 'Attendance by Day of the Week' }
        },
        scales: {
          y: { beginAtZero: true, ticks: { stepSize: 1 } }
        }
      }
    });
  </script>

  <!-- Clients Chart Script -->
  <script>
    const clientLabels = {{ client_month_labels | tojson }};
    const clientCounts = {{ client_counts | tojson }};

    new Chart(document.getElementById('clientChart'), {
      type: 'line',
      data: {
        labels: clientLabels,
        datasets: [{
          label: 'Clients Added Per Month',
          data: clientCounts,
          borderColor: 'rgba(54, 162, 235, 1)',
          backgroundColor: 'rgba(54, 162, 235, 0.2)',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          title: { display: true, text: 'Clients Added Month-wise' }
        },
        scales: {
          y: { beginAtZero: true, title: { display: true, text: 'Number of Clients' } },
          x: { title: { display: true, text: 'Month' } }
        }
      }
    });
  </script>

  <!-- Bootstrap Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
